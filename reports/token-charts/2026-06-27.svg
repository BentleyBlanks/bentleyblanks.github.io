<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">七日 token 消耗曲线图，2026-06-21 至 2026-06-27</title>
  <desc id="desc">展示 Codex、Claude Code 和合计 token 消耗趋势。合计峰值出现在 2026-06-26，为 5.7973 亿 tokens。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8faf7"/>
      <stop offset="100%" stop-color="#edf3f1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18302a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #14231f; }
      .subtitle { font: 500 14px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #5a6a64; }
      .axis { stroke: #91a59b; stroke-width: 1.5; }
      .grid { stroke: #d8e2de; stroke-width: 1; }
      .tick { font: 500 13px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #6a7973; }
      .label { font: 600 13px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #263a34; }
      .legend { font: 600 14px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #283832; }
      .value { font: 700 13px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #1f302b; }
      .note { font: 500 12px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #6d7c77; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="560" rx="0" fill="url(#bg)"/>
  <rect x="38" y="34" width="924" height="492" rx="8" fill="#ffffff" filter="url(#softShadow)"/>

  <text x="70" y="78" class="title">七日 token 消耗趋势</text>
  <text x="70" y="104" class="subtitle">2026-06-21 至 2026-06-27，单位：tokens；Claude Code 为本机会话 usage 去重汇总。</text>

  <g transform="translate(0,0)">
    <line x1="96" y1="440" x2="928" y2="440" class="axis"/>
    <line x1="96" y1="86" x2="96" y2="440" class="axis"/>

    <line x1="96" y1="86" x2="928" y2="86" class="grid"/>
    <line x1="96" y1="174.5" x2="928" y2="174.5" class="grid"/>
    <line x1="96" y1="263" x2="928" y2="263" class="grid"/>
    <line x1="96" y1="351.5" x2="928" y2="351.5" class="grid"/>
    <line x1="96" y1="440" x2="928" y2="440" class="grid"/>

    <text x="52" y="91" class="tick">6 亿</text>
    <text x="42" y="179.5" class="tick">4.5 亿</text>
    <text x="52" y="268" class="tick">3 亿</text>
    <text x="42" y="356.5" class="tick">1.5 亿</text>
    <text x="72" y="445" class="tick">0</text>

    <text x="70" y="470" class="tick">6/21</text>
    <text x="209" y="470" class="tick">6/22</text>
    <text x="347" y="470" class="tick">6/23</text>
    <text x="486" y="470" class="tick">6/24</text>
    <text x="625" y="470" class="tick">6/25</text>
    <text x="763" y="470" class="tick">6/26</text>
    <text x="902" y="470" class="tick">6/27</text>

    <polyline fill="none" stroke="#111827" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"
      points="96,439.68 234.67,435.24 373.33,382.86 512,395.43 650.67,296.78 789.33,97.99 928,205.16"/>
    <polyline fill="none" stroke="#0f8b8d" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"
      points="96,439.68 234.67,435.24 373.33,382.86 512,400.72 650.67,391.38 789.33,404.46 928,436.90"/>
    <polyline fill="none" stroke="#d97706" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"
      points="96,440 234.67,440 373.33,440 512,434.71 650.67,345.41 789.33,133.54 928,208.28"/>

    <g fill="#111827">
      <circle cx="96" cy="439.68" r="5"/>
      <circle cx="234.67" cy="435.24" r="5"/>
      <circle cx="373.33" cy="382.86" r="5"/>
      <circle cx="512" cy="395.43" r="5"/>
      <circle cx="650.67" cy="296.78" r="5"/>
      <circle cx="789.33" cy="97.99" r="5"/>
      <circle cx="928" cy="205.16" r="5"/>
    </g>
    <g fill="#0f8b8d">
      <circle cx="96" cy="439.68" r="4"/>
      <circle cx="234.67" cy="435.24" r="4"/>
      <circle cx="373.33" cy="382.86" r="4"/>
      <circle cx="512" cy="400.72" r="4"/>
      <circle cx="650.67" cy="391.38" r="4"/>
      <circle cx="789.33" cy="404.46" r="4"/>
      <circle cx="928" cy="436.90" r="4"/>
    </g>
    <g fill="#d97706">
      <circle cx="96" cy="440" r="4"/>
      <circle cx="234.67" cy="440" r="4"/>
      <circle cx="373.33" cy="440" r="4"/>
      <circle cx="512" cy="434.71" r="4"/>
      <circle cx="650.67" cy="345.41" r="4"/>
      <circle cx="789.33" cy="133.54" r="4"/>
      <circle cx="928" cy="208.28" r="4"/>
    </g>

    <rect x="626" y="116" width="260" height="88" rx="8" fill="#f7faf8" stroke="#dbe5e1"/>
    <line x1="646" y1="140" x2="682" y2="140" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
    <text x="694" y="145" class="legend">合计</text>
    <line x1="646" y1="164" x2="682" y2="164" stroke="#0f8b8d" stroke-width="3" stroke-linecap="round"/>
    <text x="694" y="169" class="legend">Codex</text>
    <line x1="646" y1="188" x2="682" y2="188" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
    <text x="694" y="193" class="legend">Claude Code</text>

    <text x="710" y="86" class="value">5.7973 亿</text>
    <line x1="790" y1="92" x2="790" y2="103" stroke="#111827" stroke-width="1.2"/>
    <text x="850" y="198" class="value">3.9805 亿</text>
    <text x="790" y="424" class="value">Codex 6024 万</text>
  </g>

  <text x="70" y="506" class="note">数据点：合计 = Codex 官方 dailyUsageBuckets + Claude Code 本地 JSONL usage 去重汇总。</text>
</svg>
