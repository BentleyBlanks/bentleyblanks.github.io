  // Civ6式头顶大横幅(易辨认): 阵营色底+大徽标字+姿态icon, 血条嵌在横幅底边 —— 我方民事=青/军事=红棕/武工=紫, 日军=深红, 伪军=橄榄
  const badge = isP ? (u.layer === "civ" ? "#2f6b6b" : u.type === "commando" ? "#4a3a6a" : "#8a2a1a")
                    : (u.type === "puppet" ? "#5f5628" : u.type === "spy" ? "#463a52" : u.type === "bandit" ? "#191412" : "#961f13");
  const posture = u.fortified ? "🛡" : u.resting ? "🛌" : (u.autoPath && u.autoPath.length) ? "🚩" : "";
  const bw = s * (posture ? 1.32 : 1.0), bh = s * 0.64, by = y - s * 0.84;
  // 指向杆(横幅→单位)
  ctx.strokeStyle = "rgba(240,220,180,.4)"; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(x, by + bh / 2); ctx.lineTo(x, y - s * 0.3); ctx.stroke();

  ctx.strokeStyle = isP ? "rgba(245,228,190,.9)" : (u.boss ? "#e8c05a" : u.type === "bandit" ? "#e23a2c" : "rgba(232,128,116,.9)"); ctx.lineWidth = (u.boss || u.type === "bandit") ? 2.2 : 1.7; ctx.stroke();
  ctx.fillStyle = "#fbf3e0"; ctx.font = "800 " + (s * 0.46) + "px 'Noto Sans SC', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(posture ? ut.glyph + posture : ut.glyph, x, by - (u.hp < 100 ? s * 0.04 : 0));

  audioEnabled = enabled;
  try { localStorage.setItem(AUDIO_STORAGE_KEY, enabled ? "1" : "0"); } catch (_) {}
  if (enabled) startBgm(); else bgmAudio.pause();
  updateAudioButton();
}

function unlockAudio(event) {
  audioUnlocked = true;
  if (!event?.target?.closest?.("#audioBtn")) startBgm();
}

function soundForButton(button) {
  const cue = button.dataset.sound;
  if (cue === "panelToggle") return $("dbgPanel").classList.contains("show") ? "sideClose" : "sideOpen";
  if (cue === "mainAction") {
    if (button.dataset.mode === "produce") return "sideOpen";
    return button.dataset.mode === "end" ? "clickHigh" : "clickMenu";
  }
  if (cue === "pendingConfirm") return pending?.type === "build" || pending?.type === "recruit" ? "productionConfirm" : "clickHigh";
  return uiAudio[cue]?.length ? cue : "click";
}

function hoverSoundForButton(button) {
  const cue = soundForButton(button);
  if (["productionConfirm", "techConfirm", "moveConfirm", "menuCollapse", "clickHigh", "cardPlace"].includes(cue)) return "hoverHigh";
  if (button.classList.contains("uab") || ["clickMetal", "lensOn"].includes(cue)) return "hoverHigher";
  return "hover";
}

addEventListener("pointerdown", unlockAudio, { capture: true, once: true });
addEventListener("keydown", unlockAudio, { capture: true, once: true });
addEventListener("pointerover", event => {
  if (event.pointerType !== "mouse") return;
  const button = event.target.closest?.("button:not(:disabled)");
  if (button && !button.contains(event.relatedTarget)) playUiSound(hoverSoundForButton(button));
}, true);
addEventListener("click", event => {
  const button = event.target.closest?.("button:not(:disabled)");
  if (!button) return;
  audioUnlocked = true;
  if (button.id !== "audioBtn") startBgm();
  if (button.id === "audioBtn") {
    const enabling = !audioEnabled;
    if (!enabling) playUiSound(soundForButton(button));
    setAudioEnabled(enabling);
    if (enabling) playUiSound(soundForButton(button));
    return;
  }
  playUiSound(soundForButton(button));
}, true);
document.addEventListener("visibilitychange", () => {
  if (document.hidden) bgmAudio.pause(); else startBgm();
});
bgmAudio.addEventListener("error", () => {
  audioAvailable = false;
  bgmAudio.pause();
  updateAudioButton();
});
updateAudioButton();
window.THAudio = { bgm: bgmAudio, isEnabled: () => audioEnabled, isAvailable: () => audioAvailable, play: playUiSound };

function toggleLog() {
  const box = $("logBox"), btn = $("logToggle"); if (!box || !btn) return;
  const collapsed = box.classList.toggle("collapsed");
  btn.textContent = collapsed ? "▸ 日志" : "▾ 日志";
  try { localStorage.setItem("taihang.log.collapsed", collapsed ? "1" : "0"); } catch (_) {}
  if (!collapsed) box.scrollTop = box.scrollHeight;
}
try { if (localStorage.getItem("taihang.log.collapsed") === "1") { const b = document.getElementById("logBox"), t = document.getElementById("logToggle"); if (b) b.classList.add("collapsed"); if (t) t.textContent = "▸ 日志"; } } catch (_) {}
function log(msg, cls) {
  const p = document.createElement("p");

  p.innerHTML = '<span class="t">' + dateStr(Math.min(state.turn, CFG.totalTurns)) + "</span>" + msg;

  const icon = (kind, fallback) => document.body.classList.contains("mode3d") ? `<i class='ric ${kind}' aria-hidden='true'></i>` : fallback;
  const tShow = Math.min(S.turn, CFG.totalTurns);

  $("uiDate").innerHTML = "📅 <b>" + dateStr(tShow) + "</b>" + (ssn ? " " + ssn : "") + " <span class='d'>(" + tShow + "/" + CFG.totalTurns + " · " + eraName(tShow) + ")</span>";
  $("uiGrain").innerHTML = icon("grain", "🌾 ") + "粮 <b>" + Math.round(S.grain) + "</b>/" + grainMax() + " <span class='d'>" + dd(inc.g) + "</span>";
  $("uiGrain").className = "res" + (inc.g < 0 ? " bad" : "");
  $("uiMan").innerHTML = icon("man", "👥 ") + "人力 <b>" + Math.round(S.man) + "</b> <span class='d'>" + dd(inc.m) + "</span>";
  $("uiArms").innerHTML = icon("arms", "🔫 ") + "军火 <b>" + Math.round(S.arms) + "</b>" + (inc.a ? " <span class='d'>" + dd(inc.a) + "</span>" : "");
  $("uiOrg").innerHTML = icon("org", "✊ ") + "组织 <b>" + Math.round(S.org) + "</b> <span class='d'>" + dd(inc.o) + "</span>";
  const exp = Math.round(S.exposure);
  $("expVal").textContent = exp;
  const fill = $("expFill");
  fill.style.width = exp + "%";
  const thr = CFG.sweepThreshold + (hasSeason(tShow, "winter") ? CFG.winterSweepThresholdAdd : 0); // 冬季日军收缩, 阈值线右移
  fill.className = exp >= thr ? "hot" : exp >= thr - 15 ? "warn" : "";
  $("expLine").style.left = thr + "%";
  // 扫荡横幅
  const bn = $("sweepBanner");
  if (S.sweep.phase === "massing") {
    bn.className = "telegraph";
    const tn = S.techs.zhencha && S.sweep.tactic ? "【" + TACTIC_INFO[S.sweep.tactic].name + "】" : "";
    bn.textContent = "⚠ 日军正在集结" + tn + " — " + S.sweep.countdown + " 回合后出动扫荡!" + (S.sweep.big ? " (空前规模!!)" : "");
  } else if (S.sweep.phase === "active") {
    bn.className = "";
    const tn = S.sweep.tactic && TACTIC_INFO[S.sweep.tactic] ? TACTIC_INFO[S.sweep.tactic].name : "扫荡";
    bn.textContent = "🔥 " + tn + "进行中 — 敌军 " + S.units.filter(u => u.sweep).length + " 队在根据地内 (" + S.sweep.ttl + " 回合后撤退)";
  } else bn.className = "hidden";
  // 结束回合按钮
  refreshMainBtn();
  // 整训按钮发光: 有能买的
  const wp = warPhase(S.turn); $("phaseBtn").innerHTML = wp.icon + " " + wp.name;
  const canBuy = !S.research && Object.keys(TECHS).some(k => !S.techs[k] && S.org >= TECHS[k].cost && tierUnlocked(TECHS[k].tier) && (!TECHS[k].need || TECHS[k].need.every(n => S.techs[n])));
  $("techBtn").classList.toggle("glow", canBuy);

// 面板按钮回调(通过 sel 定位)
function uiBuild(bk) {

  $("cInfo").innerHTML = "在 <b>" + t.village.name + "</b> 修建 <b>" + b.name + "</b>　" + costPart(state.grain, b.cost.grain, "粮") + " · " + b.turns + "回合<br><span style='color:#8a8058'>" + b.desc + "</span>";
  showConfirmNear(sel.q, sel.r); draw();
}
function uiRecruit(tk) { if (sel?.kind === "tile") { recruit(sel.q, sel.r, tk); afterAction(); } }
function uiMine() { const u = getSelUnit(); if (u) { actionMine(u); afterAction(); } }
function uiSabotage() { const u = getSelUnit(); if (u) { actionSabotage(u); afterAction(); } }
function uiRest() { const u = getSelUnit(); if (!u || u.attacked || u.resting) return; u.autoPath = null; u.resting = true; u.fortified = false; u.attacked = true; u.mp = 0; log(uname(u) + "开始原地休整 — 从回合结束起每回合回血 +" + CFG.restHeal + ", 直到满员或敌军逼近", "hl"); clearPending(false); afterAction(); }
function uiFortify() { const u = getSelUnit(); if (!u || u.attacked || u.fortified || UT[u.type].str <= 0) return; u.autoPath = null; u.fortified = true; u.resting = false; u.attacked = true; u.mp = 0; log(uname(u) + "驻扎设防 — 防御+" + (CFG.fortifyDef * (hasPromo(u, "gongshi") ? 2 : 1)) + ", 从回合结束起每回合回血, 守到你调动它", "hl"); clearPending(false); afterAction(); }
function uiWake() { const u = getSelUnit(); if (!u) return; u.resting = false; u.fortified = false; u.attacked = false; u.mp = maxMp(u); reach = moveMode ? reachable(u) : null; renderPanel(); draw(); }
function uiCancelMarch() { const u = getSelUnit(); if (!u) return; u.autoPath = null; log(uname(u) + "行军令已取消", "info"); renderPanel(); updateUI(); draw(); }
function uiPromo(i) { // 晋升二选一

// 成本标记: 不足的资源标红, 让玩家看出是哪一项卡住了建造/招募
function costPart(have, need, label) { return need ? "<span" + (have < need ? " style='color:#e2564d;font-weight:700'" : "") + ">" + label + need + "</span>" : ""; }
// 镜头聚焦某格(2D 平移 / 3D 交给 render3d)
function focusTile(q, r) {
  if (typeof mode3d !== "undefined" && mode3d && window.TH3D && window.TH3D.focus) { window.TH3D.focus(q, r); return; }
  const [cx, cy] = hexCenter(q, r); cam.x = cx * cam.zoom - innerWidth / 2; cam.y = cy * cam.zoom - innerHeight / 2;
}
function actionableUnits() { return state && state.units ? state.units.filter(u => u.side === "p" && u.mp > 0 && !u.attacked && !u.resting && !u.rooted && !(u.autoPath && u.autoPath.length)) : []; }
let producedSeen = new Set(); // 本回合已提示过"可生产"的村庄(避免反复跳同一个)
// 村庄可生产: 己方村、当前无在建、且有负担得起的未建建筑(招募是随时手动动作, 不计入提醒)
function canVillageProduce(q, r, v) {
  if (!v || v.owner !== "p" || v.build) return false;
  for (const bk in BUILDINGS) {
    if (bk === "kaiken" || bk === "didao") continue; // 开垦/挖地道交给建设队, 不再提醒
    if (v.buildings.includes(bk)) continue;
    const b = BUILDINGS[bk];
    if (b.needTech && !state.techs[b.needTech]) continue;
    if (state.grain >= b.cost.grain) return true;

}
function productiveVillages() {
  if (!state || !state.units) return [];
  const out = [];
  for (const { q, r, v } of ownedVillages()) if (canVillageProduce(q, r, v) && !producedSeen.has(key(q, r))) out.push({ q, r, v });
  return out.sort((a, b) => (a.q - b.q) || (a.r - b.r));
}
// 文明6式统一按钮: 有待命单位=「下一单位」, 全部行动完=「结束回合」
function refreshMainBtn() {
  const b = $("endTurnBtn"); if (!b || !state || !state.started) return;
  if (actionableUnits().length) { b.dataset.mode = "next"; b.innerHTML = "下一单位 <span style='font-weight:400;font-size:11px;opacity:.75'>[空格]</span>"; b.classList.remove("pulse", "produce"); }
  else if (productiveVillages().length) { const n = productiveVillages().length; b.dataset.mode = "produce"; b.innerHTML = "🏠 可生产 ▶ <span style='font-weight:400;font-size:11px;opacity:.85'>" + n + " 村待安排</span>"; b.classList.add("produce"); b.classList.remove("pulse"); }
  else { b.dataset.mode = "end"; b.textContent = "结束回合 ▶"; b.classList.add("pulse"); b.classList.remove("produce"); }
}
function mainAction() {
  if (!state || state.over) return;
  if (actionableUnits().length) { nextUnit(); return; }
  const prod = productiveVillages();
  if (prod.length) { // 跳到一个可生产的村庄并选中(面板即显示可修建的建筑)
    const t = prod[0]; producedSeen.add(key(t.q, t.r));
    exitMoveMode(); clearPending(false);
    sel = { kind: "tile", q: t.q, r: t.r }; reach = null;
    focusTile(t.q, t.r); renderPanel(); updateUI(); draw();
    return;
  }
  const b = $("endTurnBtn"); b.classList.add("pressed"); setTimeout(() => { b.classList.remove("pressed"); endTurn(); }, 30);
}
function uiSkip() { const u = getSelUnit(); if (!u) return; u.autoPath = null; u.attacked = true; u.mp = 0; u.resting = false; clearPending(false); computeVis(); updateUI(); if (actionableUnits().length) nextUnit(); else deselect(); }
// 下一待命单位: 选中并把镜头切过去
function nextUnit() {
  if (state.over) return;
  const acts = actionableUnits().sort((a, b) => a.id - b.id);
  if (!acts.length) { log("所有单位都行动完了 — 可以结束回合了。", "info"); $("endTurnBtn").classList.add("pulse"); return; }
  const cur = getSelUnit(); let next = acts[0];
  if (cur) { const i = acts.findIndex(u => u.id === cur.id); if (i >= 0) next = acts[(i + 1) % acts.length]; }
  sel = { kind: "unit", id: next.id }; reach = null; exitMoveMode();
  clearPending(false); focusTile(next.q, next.r); renderPanel(); draw();
}
function uiDisband() {
  const u = getSelUnit();
  if (!u) return;
  state.man = Math.min(CFG.manCap, state.man + Math.floor((UT[u.type].cost.man || 0) / 2));
  removeUnit(u); deselect(); afterAction();
}

function showTech() {
  if (!state || state.over) return;
  const rs = state.research;
  let html = `<h2>整训<small>组织力 ✊${Math.round(state.org)} · ${rs ? `研究中:【${TECHS[rs.k].name}】余 ${rs.left} 回合` : "选一项开始研究(需若干回合完成)"}</small></h2><div class="techTiers">`;
  for (let tier = 1; tier <= 4; tier++) {
    const unlocked = tierUnlocked(tier);
    html += `<div class="techTier"><h4>第${["一","二","三","四"][tier - 1]}阶${unlocked ? "" : " 🔒"}</h4>`;
    for (const k in TECHS) {
      const t = TECHS[k];
      if (t.tier !== tier) continue;
      const done = !!state.techs[k];
      const researching = rs && rs.k === k;
      const needOk = !t.need || t.need.every(n => state.techs[n]);
      const can = !done && !rs && unlocked && needOk && state.org >= t.cost;
      html += `<div class="techCard${done ? " done" : ""}"><b>${t.name}</b><div class="desc">${t.desc}</div>`;
      if (done) html += `<div class="lock">✓ 已完成</div>`;
      else if (researching) html += `<div class="lock" style="color:#d8a441">⏳ 研究中 · 余 ${rs.left} 回合</div>`;
      else {
        html += `<div class="cost"${state.org < t.cost ? " style='color:#e2564d;font-weight:700'" : ""}>✊ ${t.cost} · ${t.turns}回合${state.org < t.cost ? " (组织不足)" : ""}</div>`;
        if (t.need && !needOk) html += `<div class="lock">需先完成: ${t.need.map(n => TECHS[n].name).join("、")}</div>`;
        else if (!unlocked) html += `<div class="lock">${tier === 2 ? "需完成1项第一阶" : "需完成2项第二阶"}</div>`;
        else if (rs) html += `<div class="lock">另一项研究中</div>`;
        html += `<button data-sound="techConfirm" ${can ? "" : "disabled"} onclick="buyTech('${k}');showTech();updateUI();afterAction()">开始研究</button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div><div class="mbtns"><button class="mbtn ghost" data-sound="sideClose" onclick="closeModal()">返回 [T]</button></div>`;
  openModal(html);
}

function endGame(win, how) {
  state.over = true;
  clearSave();
  const S = state;
  const n = ownedVillages().length;
  let title, story;
  if (win && how === "military") {
    title = "🎉 解放县城 — 军事大捷!";
    story = "红旗插上" + TOWN_NAME + "城头。" + dateStr(S.turn) + ",全县光复,比日本投降还早了一步。你的根据地从一个山村起家,打出了一片天。";
  } else if (win && how === "survival") {
    title = n >= CFG.greatWinVillages ? "🎉 大胜 — 抗战胜利!" : "🎖 胜利 — 坚持到了最后!";
    story = "1945年8月15日,日本无条件投降。你的根据地拥有 <b>" + n + "</b> 个村庄, " +
      (n >= CFG.greatWinVillages ? "已连成一片解放区,主力整装待发——这片土地上的人民记得你们。" : "在最残酷的岁月里守住了火种。");
  } else if (how === "survival") {
    title = "😞 惨胜 — 根据地几乎打光了";
    story = "熬到了1945年8月,但仅剩 " + n + " 个村庄(需≥" + CFG.survivalWinVillages + ")。上级来电:虽保住了旗帜,根据地已名存实亡。";
  } else {
    title = "💀 总部沦陷";
    story = "扫荡的铁蹄踏碎了总部。电台在最后一刻发出讯号,余部化整为零转入深山……这一片根据地,失败了。";
  }
  const st = S.stats;
  openModal(`
<h2>${title}</h2>
<p>${story}</p>
<hr style="border:none;border-top:1px solid #3a3826;margin:10px 0">
<p>📊 战绩: 坚持 <b>${Math.min(S.turn, CFG.totalTurns)}</b> 个月 · 根据地 <b>${n}</b> 村 · 歼敌 <b>${st.kills}</b> 队(合围全歼 <b>${st.encircled || 0}</b>) · 拔炮楼 <b>${st.pillboxes}</b> 座 · 破袭铁路 <b>${st.sabotages}</b> 次 · 熬过扫荡 <b>${st.sweepsSurvived}</b> 次 · 锄奸 <b>${st.spies || 0}</b> 名 · 完成整训 <b>${Object.keys(S.techs).length}</b> 项 · 老兵部队 <b>${S.units.filter(u => u.side === "p" && (u.lv || 0) > 0).length}</b> 支</p>
<div class="mbtns"><button class="mbtn" data-sound="menuCollapse" onclick="clearSave();location.reload()">再来一局</button></div>`);
  updateUI(); draw();
}

// ═══════════════════════════════ 存档 ═══════════════════════════════
const SAVE_KEY = "taihang1941_v1";
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ state, cam })); } catch (e) {}
}
function hasSave() { try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; } }
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!d || !d.state || d.state.over) return false;
    state = d.state; cam = d.cam;
    return true;
  } catch (e) { return false; }
}

    techs: {}, research: null, exposure: 8,
    sweep: { phase: "idle", countdown: 0, ttl: 0, total: 0, killed: 0, big: false },

function handleClickTile(q, r) {

    }
  }
  exitMoveMode();
  clearPending(false);
  const mine = state.units.filter(x => x.q === q && x.r === r && x.side === "p");
  if (mine.length) {
    const cur = selU && selU.q === q && selU.r === r ? mine.indexOf(selU) : -1;

}

  bossMinTurn: "挺进队最早触发回合", bossVillages: "触发: 根据地村数≥", bossPillboxes: "触发: 拔炮楼数≥", bossEscorts: "挺进队护卫数", bossTTL: "奇袭持续回合(逾期遁走)", bossSelfStr: "队长战力加成", bossAura: "军官光环(相邻+战力)", bossHeartReward: "斩首全村+民心", pillboxRepair: "有补给的炮楼每回合自动修复", sweepSupplyFloor: "铁路全断时扫荡预算下限系数",
  banditCamps: "土匪山寨数量", banditCampHP: "山寨耐久", banditCampStr: "山寨火力", banditEvery: "每N回合土匪下山", banditGrain: "土匪洗劫每回合抢粮", banditHeart: "土匪洗劫每回合-民心", banditLootGrain: "端山寨缴获粮", banditLootArms: "端山寨缴获军火", banditRecruitMan: "统一战线收编+人力",
};
const CFG_GROUPS = [
  ["回合与胜负", ["turnsPerMonth", "totalTurns", "startYear", "survivalWinVillages", "greatWinVillages"]],
  ["地图", ["mapW", "mapH", "hexSize", "villageCount", "villageMinGap", "mountainMove", "mountainMoveMaque"]],
  ["土匪与据点守备", ["garrisonFromTurn", "garrisonRespawn", "garrisonRadius", "banditCamps", "banditCampHP", "banditCampStr", "banditEvery", "banditGrain", "banditHeart", "banditLootGrain", "banditLootArms", "banditRecruitMan"]],
  ["起始与资源", ["startGrain", "startMan", "startArms", "startOrg", "startHQHeart", "grainCap", "grainCapPerBarn", "manCap", "armsCap"]],
  ["民心与扩张", ["heartFullProd", "joinThreshold", "workteamHeart", "ownedHeartRegen", "neutralDrift", "suppressDist", "suppressCap", "revertHeart", "joinExposure"]],
  ["农田与建设", ["farmYield", "farmCapPerVillage", "builderCharges", "builderConvertCharges", "convertArms", "tunnelDigGrain"]],
  ["挺进队(Boss)", ["bossMinTurn", "bossVillages", "bossPillboxes", "bossEscorts", "bossTTL", "bossSelfStr", "bossAura", "bossHeartReward"]],
  ["暴露度", ["expPerVillage", "expPerArsenal", "expDecay", "expAttack", "expKillPillbox", "expSabotage", "expPatrolSpot", "sweepThreshold", "pitySweepGap", "sweepTelegraph"]],
  ["扫荡", ["sweepBase", "sweepPerTurn", "sweepExpFactor", "sweepCooldown", "sweepTTL", "sweepMaxUnits", "pillageGrain", "pillageHeart", "pillageBuildingChance", "tunnelDamageMult", "bigSweepTurn", "bigSweepMult", "sweepWinKillRatio"]],
  ["战斗与单位", ["dmgBase", "dmgExpDiv", "counterMult", "hpScaleFloor", "tunnelDef", "tunnelLinkRange", "tunnelNetDef", "ambushBonus", "lootArmsRatio", "healVillage", "healTerritory", "restHeal", "fortifyDef", "starveHpLoss", "starveHeartLoss"]],
  ["据点/炮楼/囚笼", ["pillboxHP", "pillboxStr", "townHP", "townStr", "siteHP", "siteStr", "siteTurns", "lootPillboxArms", "lootPillboxGrain", "patrolEvery", "patrolTTL"]],
  ["破袭/地雷/铁路", ["supplyRange", "supplyRelay", "pillboxRepair", "sweepSupplyFloor", "sabotageArms", "sabotageGrain", "mineCostArms", "mineDamage", "railRepair", "sabotageSweepReduce"]],
  ["季节", ["qsExpDecay", "qsPlainDef", "harvestGrainMult", "harvestSweepMult", "winterGrainMult", "winterHealMult", "winterSweepThresholdAdd"]],
  ["协同与经验", ["flankBonus", "flankMax", "encircleLootMult", "capturePuppetMan", "xpAttack", "xpKill", "xpStruct", "xpDefend", "xpSabotage"]],
  ["扫荡战术/特务", ["ironFromYear", "ironExtraUnits", "garrisonMaxUnits", "garrisonTTLMult", "spyFromTurn", "spyEvery", "spyMax", "spyTTL", "spyHeartLoss", "spyExpGain", "chujianHeart", "chujianExpDrop"]],
];
function cfgRow(k) { return `<div class="dr"><label class="dbgk" data-k="${k}" title="${CFG_DESC[k] || k}" onclick="dbgTip(this,event)">${k}</label><input type="number" step="any" value="${CFG[k]}" oninput="dbgCfg(this,'${k}')"></div>`; }
function dbgTip(el, ev) {
  if (ev) ev.stopPropagation();
  const tip = $("dbgTip"), k = el.dataset.k;
  tip.innerHTML = "<b style='color:#f0d488'>" + k + "</b><br>" + (CFG_DESC[k] || "(暂无说明)");
  tip.classList.add("show");
  const r = el.getBoundingClientRect(), tw = tip.offsetWidth;
  let left = r.left - tw - 10; if (left < 6) left = r.right + 10; if (left + tw > innerWidth - 6) left = innerWidth - tw - 6;
  tip.style.left = Math.max(6, left) + "px"; tip.style.top = Math.min(r.top, innerHeight - tip.offsetHeight - 6) + "px";
}
addEventListener("click", e => { const t = $("dbgTip"); if (t.classList.contains("show") && !e.target.classList.contains("dbgk")) t.classList.remove("show"); });
function dsec(title, inner, open) { return `<div class="dsec"><div class="dhead" onclick="toggleDsec(this)">${open ? "▼" : "▶"} ${title}</div><div class="dbody"${open ? "" : " style='display:none'"}>${inner}</div></div>`; }
function toggleDsec(el) { const body = el.nextElementSibling, open = body.style.display !== "none"; body.style.display = open ? "none" : "block"; el.textContent = (open ? "▶ " : "▼ ") + el.textContent.slice(2); }
function buildDebugPanel() {
  let dbgInner = `<button class="dbtn" data-sound="lensOn" onclick="revealAllMap()">🗺 一键开全地图</button><div class="note">↓ 数值参数分类(点标题看含义; 改后即时生效, 需重开局的下局生效)</div>`;
  const used = new Set();
  for (const [gname, keys] of CFG_GROUPS) { let inner = ""; for (const k of keys) if (typeof CFG[k] === "number") { used.add(k); inner += cfgRow(k); } if (inner) dbgInner += dsec(gname, inner, false); }
  let other = ""; for (const k in CFG) if (typeof CFG[k] === "number" && !used.has(k)) other += cfgRow(k);
  if (other) dbgInner += dsec("其他", other, false);
  let env = "<div class='note'>需在 3D 模式下调整</div>";
  env += `<div class="dr"><label title="关闭大气→改用程序化天空盒 CubeMap">大气 开/关</label><input type="checkbox" checked onchange="dbgApply('atmo','on',this.checked)"></div>`;
  env += dbgSl("🕑 昼夜 (0-24h)", 0, 24, 0.25, 12, "tod", "h");
  env += dbgCol("天空·天顶色", "#2a5fa8", "sky", "zenith") + dbgCol("天空·地平线色", "#acc6da", "sky", "horizon") + dbgCol("天空·夜色", "#0a1430", "sky", "night");
  env += dbgSl("太阳·强度", 0, 6, 0.1, 2.65, "sun", "intensity") + dbgCol("太阳·颜色", "#ffead0", "sun", "color");
  env += dbgSl("GI·环境光强度", 0, 3, 0.05, 0.82, "hemi", "intensity") + dbgCol("GI·天空色", "#c9d7df", "hemi", "sky") + dbgCol("GI·地面色", "#493c2b", "hemi", "ground");
  env += dbgSl("补光·强度", 0, 2, 0.05, 0.28, "amb", "intensity") + dbgCol("补光·颜色", "#596168", "amb", "color");
  env += `<div class="dr"><label>高度雾 开关</label><input type="checkbox" checked onchange="dbgApply('fog','enabled',this.checked)"></div>`;
  env += dbgSl("雾·近", 0, 60, 1, 25, "fog", "near") + dbgSl("雾·远", 20, 200, 1, 92, "fog", "far") + dbgCol("雾·颜色", "#aeb8b8", "fog", "color");
  let qual = `<div class="dr"><label>ToneMapping</label><select onchange="dbgApply('tone','mode',this.value)"><option value="aces" selected>ACESFilmic</option><option value="agx">AgX</option><option value="reinhard">Reinhard</option><option value="cineon">Cineon</option><option value="linear">Linear</option><option value="none">None</option></select></div>`;
  qual += dbgSl("曝光", 0, 2, 0.05, 0.82, "exposure", "v");
  qual += `<div class="dr"><label>TAA 抗锯齿</label><input type="checkbox" onchange="dbgApply('taa','on',this.checked)"></div>`;
  qual += `<div class="dr"><label title="关掉地表凹凸贴图, 排查地面横线是否来自bump">地表 bumpMap</label><input type="checkbox" checked onchange="dbgApply('bump','on',this.checked)"></div>`;
  qual += dbgSl("bumpMap 强度", 0, 0.1, 0.002, 0.018, "bump", "scale");
  qual += `<div class="dr"><label title="锁1x像素比+关TAA, 高分屏提帧">性能模式</label><input type="checkbox" onchange="dbgApply('perf','on',this.checked)"></div>`;
  let csm = `<div class="dr"><label title="级联数(远近分级阴影)">级联数 cascades</label><select onchange="dbgApply('csm','cascades',+this.value)"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></div>`;
  csm += `<div class="dr"><label title="每级阴影贴图分辨率">每级分辨率</label><select onchange="dbgApply('csm','size',+this.value)"><option value="1024">1024</option><option value="2048" selected>2048</option><option value="4096">4096</option></select></div>`;
  csm += dbgSl("阴影距离(maxFar)", 20, 120, 1, 55, "csm", "maxFar");
  csm += `<div class="dr"><label title="级联间平滑淡出">级联淡出 fade</label><input type="checkbox" checked onchange="dbgApply('csm','fade',this.checked)"></div>`;
  csm += `<div class="dr"><label title="关闭CSM回退单阴影(跟随镜头)">启用 CSM</label><input type="checkbox" checked onchange="dbgApply('csm','enabled',this.checked)"></div>`;
  let cam = "<div class='note'>需在 3D 模式下调整 · 越俯视=越接近正上方</div>";
  cam += dbgSl("俯视角(越小越俯视)", 0.15, 1.3, 0.02, 0.56, "cam", "polar");
  cam += dbgSl("视野 FOV", 25, 70, 1, 34, "cam", "fov");
  cam += dbgSl("最近距离(拉最近)", 4, 30, 1, 8, "cam", "minDist");
  cam += dbgSl("最远距离(拉最远)", 30, 150, 1, 85, "cam", "maxDist");
  const tools = `<div class="dr" style="gap:8px;margin:0 0 8px"><button class="tbtn${mode3d ? " on" : ""}" id="view3dBtn" data-sound="lensOn" onclick="toggle3D()" title="切换 3D/2D 视角(3D 仅桌面)">${mode3d ? "🗺 2D" : "🗺 3D"}</button><button class="tbtn" data-sound="pageTurn" onclick="showHelp(false)">📖 规则 [H]</button></div>`;
  $("dbgPanel").innerHTML = tools + dsec("Debug", dbgInner, true) + dsec("相机 (3D)", cam, false) + dsec("环境系统 (3D)", env, false) + dsec("画质 (3D)", qual, false) + dsec("级联阴影 CSM (3D)", csm, false);
}
$("dbgBtn").addEventListener("click", () => { const p = $("dbgPanel"); if (p.classList.contains("show")) { p.classList.remove("show"); $("dbgBtn").classList.remove("on"); } else { buildDebugPanel(); p.classList.add("show"); $("dbgBtn").classList.add("on"); } });

resize();
newState();       // 先生成一张底图作为标题背景
centerCam();
computeVis(); updateUI(); draw();
showHelp(true);

// 动画循环: 推进 animTime, 节流(~22fps)重绘让旗子飘荡; 弹窗打开/结束时不空转
let _lastAnimDraw = 0;
function animLoop(t) {
  animTime = t / 1000;
  if (fx.length) fx = fx.filter(e => animTime - e.t0 < e.dur); // 过期特效
  for (const [id, m] of moveAnims) if (animTime - m.t0 >= m.dur) moveAnims.delete(id); // 清理结束的滑行
  const active = fx.length > 0 || moveAnims.size || pending || atkAnims.size || shakeAnims.size || spawnAnims.size; // 特效/滑行/突进/抖动/出生/待确认时逐帧重绘, 否则节流(~22fps)只飘旗
  if (state && !state.over && !modalOpen() && (active || t - _lastAnimDraw > 45)) { _lastAnimDraw = t; draw(); }
  requestAnimationFrame(animLoop);
}
requestAnimationFrame(animLoop);

</script>
