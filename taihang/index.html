</ul>
<p><b>地形</b>(看地块图标): <b>山地</b>(雪顶山峰)守+6、移动慢、日军装甲进不来——游击最稳的老窝; <b>森林</b>(松树丛)守+4、从这里发起攻击<b>伏击+3</b>; <b>丘陵</b>(圆丘)守+3; <b>平原</b>(田垄)产粮最高但一马平川、无遮蔽、日军装甲长驱直入。</p>
<p><b>核心矛盾:暴露度。</b>发展越快、打得越狠,暴露涨得越快;到${CFG.sweepThreshold}日军就集结<b>扫荡</b>(有${CFG.sweepTelegraph}回合预警)。扫荡军会烧村抢粮毁建筑。躲进山里疏散部队、用地道保存实力、或者设伏歼敌打个反扫荡大捷——都由你选。<b>纯苟也不行</b>:长期不动日军照样清乡,而且1942年5月的<b>五一大扫荡</b>是躲不掉的历史剧本。</p>
<p><b>胜利:</b>①坚持到1945年8月日本投降且保有≥${CFG.survivalWinVillages}村(≥${CFG.greatWinVillages}村为大胜);②完成【战略反攻】整训后攻克<b>县城</b>,提前解放全县。<br><b>失败:</b>总部村被扫荡摧残至民心崩溃。</p>
<p class="hint" style="color:#8a8058">操作: 拖拽平移 / 滚轮缩放 · 点单位再点绿格移动、点红框敌人攻击 · 点己方村庄建造与招兵 · [Enter]结束回合 [T]整训 [H]规则</p>
<div class="mbtns">
  ${isStart ? `<button class="mbtn" onclick="startGame(false)">开始游戏</button>` + (hasSave() ? `<button class="mbtn ghost" onclick="startGame(true)">继续上次进度</button>` : "") : `<button class="mbtn ghost" onclick="closeModal()">返回</button><button class="mbtn ghost" onclick="if(confirm('放弃当前进度重开?')){clearSave();location.reload()}">重新开始</button>`}
</div>`);
}

function showTech() {
  if (!state || state.over) return;
  let html = `<h2>整训<small>组织力 ✊${Math.round(state.org)} · 完成一项立即生效</small></h2><div class="techTiers">`;
  for (let tier = 1; tier <= 4; tier++) {
    const unlocked = tierUnlocked(tier);
    html += `<div class="techTier"><h4>第${["一","二","三","四"][tier - 1]}阶${unlocked ? "" : " 🔒"}</h4>`;
    for (const k in TECHS) {
      const t = TECHS[k];
      if (t.tier !== tier) continue;
      const done = !!state.techs[k];
      const needOk = !t.need || t.need.every(n => state.techs[n]);
      const can = !done && unlocked && needOk && state.org >= t.cost;
      html += `<div class="techCard${done ? " done" : ""}"><b>${t.name}</b><div class="desc">${t.desc}</div>`;
      if (done) html += `<div class="lock">✓ 已完成</div>`;
      else {
        html += `<div class="cost">✊ ${t.cost}</div>`;
        if (t.need && !needOk) html += `<div class="lock">需先完成: ${t.need.map(n => TECHS[n].name).join("、")}</div>`;
        else if (!unlocked) html += `<div class="lock">${tier === 2 ? "需完成1项第一阶" : "需完成2项第二阶"}</div>`;
        html += `<button ${can ? "" : "disabled"} onclick="buyTech('${k}');showTech();updateUI();afterAction()">整训</button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div><div class="mbtns"><button class="mbtn ghost" onclick="closeModal()">返回 [T]</button></div>`;
  openModal(html);
}

function endGame(win, how) {
  state.over = true;
  clearSave();
  const S = state;
  const n = ownedVillages().length;
  let title, story;
  if (win && how === "military") {
    title = "🎉 解放县城 — 军事大捷!";
    story = "红旗插上" + TOWN_NAME + "城头。" + dateStr(S.turn) + ",全县光复,比日本投降还早了一步。你的根据地从一个山村起家,打出了一片天。";
  } else if (win && how === "survival") {
    title = n >= CFG.greatWinVillages ? "🎉 大胜 — 抗战胜利!" : "🎖 胜利 — 坚持到了最后!";
    story = "1945年8月15日,日本无条件投降。你的根据地拥有 <b>" + n + "</b> 个村庄, " +
      (n >= CFG.greatWinVillages ? "已连成一片解放区,主力整装待发——这片土地上的人民记得你们。" : "在最残酷的岁月里守住了火种。");
  } else if (how === "survival") {
    title = "😞 惨胜 — 根据地几乎打光了";
    story = "熬到了1945年8月,但仅剩 " + n + " 个村庄(需≥" + CFG.survivalWinVillages + ")。上级来电:虽保住了旗帜,根据地已名存实亡。";
  } else {
    title = "💀 总部沦陷";
    story = "扫荡的铁蹄踏碎了总部。电台在最后一刻发出讯号,余部化整为零转入深山……这一片根据地,失败了。";
  }
  const st = S.stats;
  openModal(`
<h2>${title}</h2>
<p>${story}</p>
<hr style="border:none;border-top:1px solid #3a3826;margin:10px 0">
<p>📊 战绩: 坚持 <b>${Math.min(S.turn, CFG.totalTurns)}</b> 个月 · 根据地 <b>${n}</b> 村 · 歼敌 <b>${st.kills}</b> 队 · 拔炮楼 <b>${st.pillboxes}</b> 座 · 破袭铁路 <b>${st.sabotages}</b> 次 · 熬过扫荡 <b>${st.sweepsSurvived}</b> 次 · 完成整训 <b>${Object.keys(S.techs).length}</b> 项</p>
<div class="mbtns"><button class="mbtn" onclick="clearSave();location.reload()">再来一局</button></div>`);
  updateUI(); draw();
}

// ═══════════════════════════════ 存档 ═══════════════════════════════
const SAVE_KEY = "taihang1941_v1";
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ state, cam })); } catch (e) {}
}
function hasSave() { try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; } }
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!d || !d.state || d.state.over) return false;
    state = d.state; cam = d.cam;
    return true;
  } catch (e) { return false; }
}

// ═══════════════════════════════ 初始化 ═══════════════════════════════
function newState() {
  rng = mulberry32((Date.now() % 100000) | 0);
  const { tiles, hq } = genMap();
  state = {
    turn: 1, over: false, started: false,
    grain: CFG.startGrain, man: CFG.startMan, arms: CFG.startArms, org: CFG.startOrg,
    tiles, hq, units: [], nextUid: 1,
    techs: {}, exposure: 8,
    sweep: { phase: "idle", countdown: 0, ttl: 0, total: 0, killed: 0, big: false },
    lastSweepEnd: 0, era: "",
    lastIncome: { g: 0, m: 0, o: 0, a: 0 },
    stats: { kills: 0, pillboxes: 0, sabotages: 0, sweepsSurvived: 0, joined: 0 },
  };
  revealArea(hq.q, hq.r, 3);
  const m = spawnUnit("militia", hq.q, hq.r); if (m) m.mp = UT.militia.mp;
  const sc = spawnUnit("scout", hq.q, hq.r); if (sc) sc.mp = UT.scout.mp;
  const wk = spawnUnit("work", hq.q, hq.r); if (wk) wk.mp = UT.work.mp;
}
function centerCam() {
  const [cx, cy] = hexCenter(state.hq.q, state.hq.r);
  cam.zoom = innerWidth < 640 ? 0.8 : 1;
  cam.x = cx * cam.zoom - innerWidth / 2;
  cam.y = cy * cam.zoom - innerHeight / 2;
}
function startGame(fromSave) {
  closeModal();
  if (fromSave && loadGame()) {
    state.started = true;
    log("── 进度已恢复 · " + dateStr(state.turn) + " ──", "hl");
  } else {
    newState();
    state.started = true;
    centerCam();
    log("═══ 1941年1月 · 囚笼初现 ═══", "hl");
    log("你在王家峪设立总部。侦察员待命, 工作队整装 — 出发, 到群众中去!", "hl");
    log("提示: 先派侦察员探路, 工作队进邻村发动群众。日军的铁路在东边。", "good");
  }
  computeVis(); updateUI(); renderPanel(); draw();
}

// ── 顶栏资源点击说明(对标文明6产出分解: 现值 / 每回合来源 / 怎么提升) ──
function showResourceInfo(kind) {
  if (!state || !state.started || state.over) return;
  const S = state, owned = ownedVillages();
  const inc = S.lastIncome || { g: 0, m: 0, o: 0, a: 0 };
  const R = n => (n >= 0 ? "+" : "") + n;
  // 按民心系数汇总某资源(0粮/1人力/2组织)的地形/建筑/总部三源
  const sum = (i) => {
    let terr = 0, hq = 0, bld = 0;
    for (const { q, r, v } of owned) {
      const m = heartMult(v.heart);
      terr += CFG.yields[S.tiles[q][r].terrain][i] * m;
      if (v.hq) hq += CFG.hqBonus[i] * m;
      for (const b of v.buildings) bld += (BUILDING_YIELD[b] ? BUILDING_YIELD[b][i] : 0) * m;
    }
    return { terr: Math.round(terr), hq: Math.round(hq), bld: Math.round(bld) };
  };
  const cnt = (bk) => owned.reduce((a, o) => a + o.v.buildings.filter(b => b === bk).length, 0);
  const lowHeart = owned.filter(o => o.v.heart < CFG.heartFullProd).length;
  const heartNote = lowHeart ? `<p class="warn" style="color:#d8a441">⚠ 有 ${lowHeart} 座村民心&lt;60，产出被打折(≥30 打七五折，&lt;30 腰斩)——派工作队把民心拉满是最快的增产。</p>` : "";
  let title = "", body = "", how = "";
  if (kind === "grain") {
    const g = sum(0); let up = 0; for (const u of S.units) if (u.side === "p") up += UT[u.type].upkeep;
    title = "🌾 粮食 " + Math.round(S.grain) + " / " + grainMax();
    body = `<div class="rbrk"><div class="rl"><span>村庄地形基础</span><b>${R(g.terr)}</b></div>`
      + `<div class="rl"><span>开垦地 ×${cnt("kaiken")}（各 +4）</span><b>${R(g.bld)}</b></div>`
      + `<div class="rl"><span>总部村</span><b>${R(g.hq)}</b></div>`
      + `<div class="rl"><span>脱产部队维护</span><b>${R(-up)}</b></div>`
      + `<div class="rl tot"><span>合计 / 回合</span><b>${R(g.terr + g.bld + g.hq - up)}</b></div></div>`;
    how = "修【开垦地】(+4/回合) · 优先占产粮最高的平原村(平原基础8) · 把村民心拉到≥60吃满产 · 少养脱产部队省维护 · 修【藏粮洞】防扫荡被抢。";
  } else if (kind === "man") {
    const g = sum(1);
    title = "👥 人力 " + Math.round(S.man) + " / " + CFG.manCap;
    body = `<div class="rbrk"><div class="rl"><span>村庄产出(地形)</span><b>${R(g.terr)}</b></div>`
      + `<div class="rl"><span>总部村</span><b>${R(g.hq)}</b></div>`
      + `<div class="rl tot"><span>合计 / 回合</span><b>${R(g.terr + g.hq)}</b></div></div>`;
    how = "人力全来自村庄产出——多占村、优先平原/丘陵(人力基础高)、把民心拉到≥60吃满产。人力是招兵扩军的瓶颈。";
  } else if (kind === "org") {
    const g = sum(2);
    title = "✊ 组织 " + Math.round(S.org);
    body = `<div class="rbrk"><div class="rl"><span>村庄地形基础</span><b>${R(g.terr)}</b></div>`
      + `<div class="rl"><span>冬学夜校 ×${cnt("yexiao")}（各 +2）</span><b>${R(g.bld)}</b></div>`
      + `<div class="rl"><span>总部村（+2）</span><b>${R(g.hq)}</b></div>`
      + `<div class="rl tot"><span>合计 / 回合</span><b>${R(g.terr + g.bld + g.hq)}</b></div></div>`;
    how = "修【冬学夜校】(+2/回合，专产组织) · 多占村 · 把民心拉到≥60吃满产。组织力是【整训】科技树的唯一货币——地雷战/地道战/破袭战/主力团全靠它。";
  } else if (kind === "arms") {
    const ar = cnt("arsenal");
    title = "🔫 军火 " + Math.round(S.arms) + " / " + CFG.armsCap;
    body = `<div class="rbrk"><div class="rl"><span>兵工坊 ×${ar}（各 +2）</span><b>${R(ar * 2)}</b></div>`
      + `<div class="rl tot"><span>稳定产出 / 回合</span><b>${R(ar * 2)}</b></div></div>`
      + `<p style="color:#9a8d68">军火主要不是"产"出来的，是"抢"来的——缴获才是大头。</p>`;
    how = "①打日军<b>缴获</b>是主力：歼敌=敌战力×0.5、拔炮楼+15、破袭铁路+12；②修【兵工坊】稳定+2/回合(需【兵工生产】科技，但每座+1暴露)。注意：库存军火本身也算防御(防御=兵员+军火×0.5)，别全花光。";
  } else { // exp
    const nonHQ = owned.filter(o => !o.v.hq).length, ar = cnt("arsenal");
    const dec = CFG.expDecay + (S.techs.diwork ? 1 : 0);
    const net = nonHQ * CFG.expPerVillage + ar * CFG.expPerArsenal - dec;
    title = "⚠ 暴露度 " + Math.round(S.exposure) + " / 100";
    body = `<div class="rbrk"><div class="rl"><span>己方村 ×${nonHQ}（各 +0.7）</span><b>+${(nonHQ * CFG.expPerVillage).toFixed(1)}</b></div>`
      + `<div class="rl"><span>兵工坊 ×${ar}（各 +1）</span><b>+${(ar * CFG.expPerArsenal).toFixed(1)}</b></div>`
      + `<div class="rl"><span>自然衰减${S.techs.diwork ? "(敌工科+1)" : ""}</span><b>-${dec.toFixed(1)}</b></div>`
      + `<div class="rl tot"><span>被动 / 回合</span><b>${R(+net.toFixed(1))}</b></div></div>`
      + `<p style="color:#9a8d68">另有一次性：主动攻击+5、拔炮楼+12、破袭+8、并入新村+6。到 <b style="color:#e2564d">${CFG.sweepThreshold}</b> 日军就集结扫荡(3回合预警)。</p>`;
    how = "少打(军事行动最涨暴露) · 别一口气并入太多村 · 把部队藏进山地/地道 · 点【敌工科】科技加衰减 · 破袭铁路虽+暴露但削弱下次扫荡。<b>但纯苟也不行</b>：超过15回合不动会被强制扫荡。";
  }
  openModal(`<h2>${title}</h2>${body}${heartNote}<p><b>怎么提升/控制：</b>${how}</p><div class="mbtns"><button class="mbtn ghost" onclick="closeModal()">知道了</button></div>`);
}
$("uiGrain").addEventListener("click", () => showResourceInfo("grain"));
$("uiMan").addEventListener("click", () => showResourceInfo("man"));
$("uiArms").addEventListener("click", () => showResourceInfo("arms"));
$("uiOrg").addEventListener("click", () => showResourceInfo("org"));
$("expWrap").addEventListener("click", () => showResourceInfo("exp"));
$("endTurnBtn").addEventListener("click", endTurn);
$("techBtn").addEventListener("click", showTech);
$("helpBtn").addEventListener("click", () => showHelp(false));

resize();
newState();       // 先生成一张底图作为标题背景
centerCam();
computeVis(); updateUI(); draw();
showHelp(true);

// 动画循环: 推进 animTime, 节流(~22fps)重绘让旗子飘荡; 弹窗打开/结束时不空转
let _lastAnimDraw = 0;
function animLoop(t) {
  animTime = t / 1000;
  if (state && !state.over && !modalOpen() && t - _lastAnimDraw > 45) { _lastAnimDraw = t; draw(); }
  requestAnimationFrame(animLoop);
}
requestAnimationFrame(animLoop);

</script>
</body>
