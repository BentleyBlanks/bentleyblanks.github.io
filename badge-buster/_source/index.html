<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>噩梦角标清除铺 · Badge Buster Shop</title>
  <meta name="description" content="一款 2D 放置 / 增量网页小游戏：经营一家清除手机红色角标的铺子。" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="theme-color" content="#5B8DEF" />
  <style>
    :root {
      --cream: #FBF7F0;
      --blue: #5B8DEF;
      --red: #FF3B30;
      --orange: #FF9F43;
      --mint: #26C6A6;
      --ink: #2B2B33;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #20232b;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #app {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    #stage {
      position: relative;
      width: 100%;
      max-width: 960px;
      aspect-ratio: 960 / 640;
      max-height: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      touch-action: none;
    }
    #game {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
    }
    /* DOM UI overlay — controls opt back into pointer events */
    #ui {
      position: absolute; inset: 0;
      pointer-events: none;
      font-size: 14px;
      user-select: none;
    }
    #ui button, #ui .clickable { pointer-events: auto; }
    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--cream); color: var(--ink);
      font-size: 18px; letter-spacing: 1px;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="ui"></div>
      <div id="loading">开张中…</div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
