<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>角标清道夫 AI · Badge Buster AI</title>
    <meta name="theme-color" content="#0b1120" />
    <meta name="description" content="俯视桌面玩具式增量游戏：点红点、拖卡片、喂炼化炉、提炼算力。" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #0b1120;
        color: #e8eefc;
        font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #stage-root { position: fixed; inset: 0; }
      #stage-root canvas { display: block; width: 100%; height: 100%; }

      /* loader — replaced by canvas once Pixi boots */
      #boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px; z-index: 10;
        background: radial-gradient(900px 600px at 70% -10%, #16223f 0%, #0b1120 60%);
        transition: opacity .4s; pointer-events: none;
      }
      #boot.hidden { opacity: 0; }
      #boot .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
      #boot .logo small { display: block; font-size: 11px; color: #5f7099; font-weight: 500; letter-spacing: 2px; margin-top: 4px; }
      #boot .bar { width: 180px; height: 6px; border-radius: 999px; background: #1b2742; overflow: hidden; }
      #boot .bar i { display: block; height: 100%; width: 30%; border-radius: 999px;
        background: linear-gradient(90deg, #5ad0ff, #8a7bff); animation: boot 1.1s ease-in-out infinite; }
      @keyframes boot { 0% { transform: translateX(-120%); } 100% { transform: translateX(420%); } }
    </style>
  </head>
  <body>
    <div id="stage-root"></div>
    <div id="boot">
      <div class="logo">角标清道夫 AI<small>BADGE BUSTER AI</small></div>
      <div class="bar"><i></i></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
